name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            gitcode/gc:latest
            gitcode/gc:${{ steps.get_version.outputs.VERSION }}
            ghcr.io/gitcode-com/gc:latest
            ghcr.io/gitcode-com/gc:${{ steps.get_version.outputs.VERSION }}

  homebrew:
    name: Homebrew Tap Update
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Update Homebrew tap
        run: |
          echo "Homebrew tap will be updated by Goreleaser automatically"
          echo "Ensure HOMEBREW_TAP_GITHUB_TOKEN is set in repository secrets"

  scoop:
    name: Scoop Bucket Update
    runs-on: ubuntu-latest
    needs: goreleaser
    steps:
      - name: Update Scoop bucket
        run: |
          echo "Scoop bucket will be updated by Goreleaser automatically"
          echo "Ensure SCOOP_BUCKET_GITHUB_TOKEN is set in repository secrets"