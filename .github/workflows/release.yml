name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0). Leave empty to use the latest tag.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build RPM/DEB packages
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          VERSION_NUM=${VERSION#v}

          # Update version in nfpm configs
          sed -i "s/version: .*/version: \"$VERSION_NUM\"/" nfpm-amd64.yaml
          sed -i "s/version: .*/version: \"$VERSION_NUM\"/" nfpm-arm64.yaml

          # GoReleaser already built binaries in dist/
          cd dist

          # Extract amd64 binary
          tar -xzf gc_*_linux_amd64.tar.gz
          mv gc gc_linux_amd64

          # Extract arm64 binary
          tar -xzf gc_*_linux_arm64.tar.gz
          mv gc gc_linux_arm64

          # Build packages
          ~/go/bin/nfpm package -f ../nfpm-amd64.yaml -p deb -t .
          ~/go/bin/nfpm package -f ../nfpm-amd64.yaml -p rpm -t .
          ~/go/bin/nfpm package -f ../nfpm-arm64.yaml -p deb -t .
          ~/go/bin/nfpm package -f ../nfpm-arm64.yaml -p rpm -t .

      - name: Upload RPM/DEB artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: |
            dist/*.rpm
            dist/*.deb
          retention-days: 90

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}

          # Download all binaries
          gh release download $VERSION \
            --pattern 'gc_*_linux_amd64.tar.gz' \
            --pattern 'gc_*_linux_arm64.tar.gz' \
            --pattern 'gc_*_darwin_amd64.tar.gz' \
            --pattern 'gc_*_darwin_arm64.tar.gz' \
            --pattern 'gc_*_windows_amd64.zip' \
            --dir /tmp

          # Create bin directory
          mkdir -p $GITHUB_WORKSPACE/gc_cli/bin

          # Extract binaries
          cd /tmp
          tar -xzf gc_*_linux_amd64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-linux-amd64
          tar -xzf gc_*_linux_arm64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-linux-arm64
          tar -xzf gc_*_darwin_amd64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-darwin-amd64
          tar -xzf gc_*_darwin_arm64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-darwin-arm64
          unzip -o gc_*_windows_amd64.zip && mv gc.exe $GITHUB_WORKSPACE/gc_cli/bin/gc-windows-amd64.exe

      - name: Update version in pyproject.toml
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" gc_cli/__init__.py

      - name: Build Python package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1