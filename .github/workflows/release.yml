name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, with optional v prefix (e.g., v1.0.0, 1.0.0, v1.0.0-rc.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.VERSION_TAG }}
      package_version: ${{ steps.version.outputs.VERSION_NUM }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Validate version input
        id: version
        env:
          VERSION_INPUT: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_INPUT}"
          VERSION_NUM="$(./scripts/validate-release-version.sh "${VERSION}")"
          VERSION_TAG="v${VERSION_NUM}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NUM=${VERSION_NUM}" >> "$GITHUB_OUTPUT"

      - name: Generate completions
        run: |
          go build -o /tmp/gc ./cmd/gc
          mkdir -p completions
          /tmp/gc completion bash > completions/gc.bash
          /tmp/gc completion zsh > completions/gc.zsh
          /tmp/gc completion fish > completions/gc.fish

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync version across configs
        env:
          VERSION_NUM: ${{ steps.version.outputs.VERSION_NUM }}
        run: |
          set -euo pipefail
          sed -i "s/version: \".*\"/version: \"${VERSION_NUM}\"/" nfpm-amd64.yaml
          sed -i "s/version: \".*\"/version: \"${VERSION_NUM}\"/" nfpm-arm64.yaml
          sed -i "s/version = \".*\"/version = \"${VERSION_NUM}\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION_NUM}\"/" gc_cli/__init__.py

      - name: Install nfpm
        run: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Build DEB/RPM packages
        env:
          VERSION_NUM: ${{ steps.version.outputs.VERSION_NUM }}
        run: |
          set -euo pipefail

          # Extract GoReleaser linux binaries
          tar -xzf dist/gc_*_linux_amd64.tar.gz -C dist
          mv dist/gc dist/gc_linux_amd64

          tar -xzf dist/gc_*_linux_arm64.tar.gz -C dist
          mv dist/gc dist/gc_linux_arm64

          # Build packages
          ~/go/bin/nfpm package -f nfpm-amd64.yaml -p deb -t dist
          ~/go/bin/nfpm package -f nfpm-amd64.yaml -p rpm -t dist
          ~/go/bin/nfpm package -f nfpm-arm64.yaml -p deb -t dist
          ~/go/bin/nfpm package -f nfpm-arm64.yaml -p rpm -t dist

      - name: Upload DEB/RPM artifacts
        uses: actions/upload-artifact@v5
        with:
          name: packages
          path: |
            dist/*.rpm
            dist/*.deb
          retention-days: 90

      - name: Create and push tag
        env:
          VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}
        run: |
          set -euo pipefail
          if git rev-parse --verify --quiet "refs/tags/${VERSION_TAG}" >/dev/null; then
            echo "Tag ${VERSION_TAG} already exists, using it"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag -a "${VERSION_TAG}" -m "Release ${VERSION_TAG}"
            git push origin "refs/tags/${VERSION_TAG}"
          fi

      - name: Upload packages to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}
        run: |
          set -euo pipefail
          gh release upload "${VERSION_TAG}" dist/*.deb dist/*.rpm --clobber

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
    environment:
      name: pypi
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Setup version
        id: version
        env:
          VERSION_FROM_BUILD: ${{ needs.build.outputs.version }}
        run: |
          set -euo pipefail
          VERSION="${VERSION_FROM_BUILD}"
          VERSION_NUM="$(./scripts/validate-release-version.sh "${VERSION}")"
          VERSION_TAG="v${VERSION_NUM}"
          echo "VERSION_TAG=${VERSION_TAG}" >> "$GITHUB_OUTPUT"
          echo "VERSION_NUM=${VERSION_NUM}" >> "$GITHUB_OUTPUT"

      - name: Sync version in configs
        env:
          VERSION_NUM: ${{ steps.version.outputs.VERSION_NUM }}
        run: |
          set -euo pipefail
          sed -i "s/version = \".*\"/version = \"${VERSION_NUM}\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"${VERSION_NUM}\"/" gc_cli/__init__.py

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}
        run: |
          set -euo pipefail
          gh release download "${VERSION_TAG}" \
            --pattern 'gc_*_linux_amd64.tar.gz' \
            --pattern 'gc_*_linux_arm64.tar.gz' \
            --pattern 'gc_*_darwin_amd64.tar.gz' \
            --pattern 'gc_*_darwin_arm64.tar.gz' \
            --pattern 'gc_*_windows_amd64.zip' \
            --dir /tmp

      - name: Extract binaries for PyPI
        run: |
          mkdir -p gc_cli/bin
          cd /tmp
          tar -xzf gc_*_linux_amd64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-linux-amd64
          tar -xzf gc_*_linux_arm64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-linux-arm64
          tar -xzf gc_*_darwin_amd64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-darwin-amd64
          tar -xzf gc_*_darwin_arm64.tar.gz && mv gc $GITHUB_WORKSPACE/gc_cli/bin/gc-darwin-arm64
          unzip -o gc_*_windows_amd64.zip && mv gc.exe $GITHUB_WORKSPACE/gc_cli/bin/gc-windows-amd64.exe
          cd $GITHUB_WORKSPACE

      - name: Install build tools
        run: pip install build

      - name: Build Python package
        run: python -m build --wheel --sdist --outdir dist/

      - name: Upload wheel and sdist to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION_TAG: ${{ steps.version.outputs.VERSION_TAG }}
        run: |
          set -euo pipefail
          gh release upload "${VERSION_TAG}" dist/*.whl dist/*.tar.gz --clobber

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
