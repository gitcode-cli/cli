name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0). Leave empty to use the latest tag.'
        required: false
        default: ''

permissions:
  contents: write
  packages: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    needs: goreleaser
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tools
        run: pip install build

      - name: Get version
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Download release binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p gc_cli/bin
          VERSION=${{ steps.get_version.outputs.VERSION }}

          # Download Linux binaries
          gh release download $VERSION --pattern 'gc_*_linux_amd64.tar.gz' --dir /tmp
          gh release download $VERSION --pattern 'gc_*_linux_arm64.tar.gz' --dir /tmp

          # Download macOS binaries
          gh release download $VERSION --pattern 'gc_*_darwin_amd64.tar.gz' --dir /tmp
          gh release download $VERSION --pattern 'gc_*_darwin_arm64.tar.gz' --dir /tmp

          # Download Windows binary
          gh release download $VERSION --pattern 'gc_*_windows_amd64.zip' --dir /tmp

          # Extract binaries
          cd /tmp
          tar -xzf gc_*_linux_amd64.tar.gz && mv gc gc_cli/bin/gc-linux-amd64
          tar -xzf gc_*_linux_arm64.tar.gz && mv gc gc_cli/bin/gc-linux-arm64
          tar -xzf gc_*_darwin_amd64.tar.gz && mv gc gc_cli/bin/gc-darwin-amd64
          tar -xzf gc_*_darwin_arm64.tar.gz && mv gc gc_cli/bin/gc-darwin-arm64
          unzip -o gc_*_windows_amd64.zip && mv gc.exe gc_cli/bin/gc-windows-amd64.exe

          # Move bin directory back
          mv gc_cli/bin $GITHUB_WORKSPACE/gc_cli/bin

      - name: Update version in pyproject.toml
        run: |
          VERSION=${{ steps.get_version.outputs.VERSION }}
          VERSION=${VERSION#v}  # Remove 'v' prefix
          sed -i "s/version = \".*\"/version = \"$VERSION\"/" pyproject.toml
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" gc_cli/__init__.py

      - name: Build Python package
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}