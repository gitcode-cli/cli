# .goreleaser.yaml
# GitCode CLI Release Configuration

project_name: gc

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: gc
    main: ./cmd/gc
    binary: gc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    goarm:
      - "6"
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - completions/*

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "merge conflict"
      - "Merge pull request"
      - "Merge remote-tracking branch"
      - "Merge branch"
  groups:
    - title: "New Features"
      regexp: "^.*feat[(\\w)]*:+.*$"
      order: 0
    - title: "Bug Fixes"
      regexp: "^.*fix[(\\w)]*:+.*$"
      order: 10
    - title: "Documentation"
      regexp: "^.*docs[(\\w)]*:+.*$"
      order: 20
    - title: "Others"
      order: 999

nfpms:
  - id: gc
    package_name: gc
    vendor: gitcode-cli
    homepage: https://gitcode.com/gitcode-cli/cli
    maintainer: gitcode-cli contributors
    description: GitCode CLI - Command line tool for GitCode
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: ./completions/gc.bash
        dst: /usr/share/bash-completion/completions/gc
        file_info:
          mode: 0644
      - src: ./completions/gc.zsh
        dst: /usr/share/zsh/vendor-completions/_gc
        file_info:
          mode: 0644
      - src: ./completions/gc.fish
        dst: /usr/share/fish/completions/gc.fish
        file_info:
          mode: 0644
    scripts:
      postinstall: "scripts/postinstall.sh"
      preremove: "scripts/preremove.sh"
    rpm:
      summary: GitCode CLI
      group: Development/Tools
      compression: xz
    deb:
      compression: xz

release:
  github:
    owner: gitcode-com
    name: gitcode-cli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## GitCode CLI {{ .Version }}

    A command line tool for GitCode.
  footer: |
    **Full Changelog**: https://gitcode.com/gitcode-cli/cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    ### PyPI (pip)
    ```bash
    pip install gitcode-cli
    ```

    ### Linux (DEB/RPM)
    ```bash
    # DEB
    sudo dpkg -i gc_*_linux_amd64.deb

    # RPM
    sudo rpm -i gc_*_linux_amd64.rpm
    ```

    ### Binary
    Download the appropriate binary for your platform from the assets below.

announce:
  skip: false
  twitter:
    enabled: false
  slack:
    enabled: false
  discord:
    enabled: false